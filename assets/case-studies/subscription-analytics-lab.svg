<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Subscription Analytics Lab Case Study</title>
  <desc id="desc">Visual case study for a subscription analytics project using Python, SQL, SQLite, and Streamlit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f9ff"/>
      <stop offset="100%" stop-color="#eaf6f2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1a365d" flood-opacity="0.14"/>
    </filter>
    <style>
      .eyebrow { font: 800 16px 'Segoe UI', Arial, sans-serif; fill: #0f766e; letter-spacing: 2px; }
      .title { font: 850 48px 'Segoe UI', Arial, sans-serif; fill: #102033; letter-spacing: -1px; }
      .subtitle { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #526173; }
      .section { font: 800 24px 'Segoe UI', Arial, sans-serif; fill: #12263a; }
      .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #607184; }
      .metric { font: 850 34px 'Segoe UI', Arial, sans-serif; fill: #0f766e; }
      .body { font: 560 19px 'Segoe UI', Arial, sans-serif; fill: #25364a; }
      .small { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #607184; }
      .chip { font: 800 15px 'Segoe UI', Arial, sans-serif; fill: #11313a; }
    </style>
  </defs>
  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1140" cy="110" r="180" fill="#13b8a6" opacity="0.10"/>
  <circle cx="120" cy="630" r="160" fill="#f6b84f" opacity="0.12"/>

  <g transform="translate(70 64)">
    <text class="eyebrow" x="0" y="0">CASE STUDY 01</text>
    <text class="title" x="0" y="62">Subscription Analytics Lab</text>
    <text class="subtitle" x="0" y="102">Customer health, revenue risk, cohort retention, and KPI reporting.</text>
  </g>

  <g transform="translate(70 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="118" rx="24" fill="url(#card)"/>
    <text class="label" x="26" y="36">ACTIVE CUSTOMERS</text>
    <text class="metric" x="26" y="82">232</text>
  </g>
  <g transform="translate(315 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="118" rx="24" fill="url(#card)"/>
    <text class="label" x="26" y="36">MRR SNAPSHOT</text>
    <text class="metric" x="26" y="82">61.4K</text>
  </g>
  <g transform="translate(560 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="118" rx="24" fill="url(#card)"/>
    <text class="label" x="26" y="36">ARPA</text>
    <text class="metric" x="26" y="82">264.73</text>
  </g>
  <g transform="translate(805 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="118" rx="24" fill="url(#card)"/>
    <text class="label" x="26" y="36">LOGO CHURN</text>
    <text class="metric" x="26" y="82">1.28%</text>
  </g>
  <g transform="translate(1010 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="118" rx="24" fill="url(#card)"/>
    <text class="label" x="26" y="36">AVG CSAT</text>
    <text class="metric" x="26" y="82">4.33</text>
  </g>

  <g transform="translate(70 385)">
    <text class="section" x="0" y="0">Analytical Workflow</text>
    <g transform="translate(0 48)">
      <rect x="0" y="0" width="190" height="84" rx="22" fill="#102033"/>
      <text class="chip" x="36" y="35" fill="#ffffff">Raw business</text>
      <text class="chip" x="52" y="59" fill="#ffffff">data</text>
      <path d="M205 42 L254 42" stroke="#0f766e" stroke-width="4" stroke-linecap="round"/>
      <path d="M246 32 L260 42 L246 52" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="275" y="0" width="190" height="84" rx="22" fill="#ffffff" stroke="#c8dde8"/>
      <text class="chip" x="314" y="35">Customer-month</text>
      <text class="chip" x="345" y="59">model</text>
      <path d="M480 42 L529 42" stroke="#0f766e" stroke-width="4" stroke-linecap="round"/>
      <path d="M521 32 L535 42 L521 52" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="550" y="0" width="190" height="84" rx="22" fill="#ffffff" stroke="#c8dde8"/>
      <text class="chip" x="615" y="35">SQL</text>
      <text class="chip" x="592" y="59">reporting</text>
      <path d="M755 42 L804 42" stroke="#0f766e" stroke-width="4" stroke-linecap="round"/>
      <path d="M796 32 L810 42 L796 52" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="825" y="0" width="240" height="84" rx="22" fill="#0f766e"/>
      <text class="chip" x="883" y="35" fill="#ffffff">Dashboard and</text>
      <text class="chip" x="904" y="59" fill="#ffffff">insights</text>
    </g>
  </g>

  <g transform="translate(70 580)">
    <text class="section" x="0" y="0">What it demonstrates</text>
    <text class="body" x="0" y="44">Python pipeline, SQL-backed analysis, KPI design, cohort retention, churn watchlist, and business-ready reporting.</text>
  </g>

  <g transform="translate(1010 54)">
    <rect x="0" y="0" width="200" height="42" rx="21" fill="#dff7ef"/>
    <text class="chip" x="36" y="27">Python + SQL</text>
    <rect x="0" y="54" width="200" height="42" rx="21" fill="#fff2d1"/>
    <text class="chip" x="44" y="81">Streamlit</text>
  </g>
</svg>
