<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">SOC Home Lab v2 Case Study</title>
  <desc id="desc">Visual case study for a SOC analytics project using simulated telemetry, detection rules, SQL reporting, and dashboards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="55%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#142b36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#79a7ff"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .eyebrow { font: 800 16px 'Segoe UI', Arial, sans-serif; fill: #5eead4; letter-spacing: 2px; }
      .title { font: 850 48px 'Segoe UI', Arial, sans-serif; fill: #f5f7fb; letter-spacing: -1px; }
      .subtitle { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #b7c5d6; }
      .section { font: 800 24px 'Segoe UI', Arial, sans-serif; fill: #f5f7fb; }
      .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #9db0c7; }
      .metric { font: 850 34px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .body { font: 560 19px 'Segoe UI', Arial, sans-serif; fill: #d5dfeb; }
      .small { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #d5dfeb; }
      .chip { font: 800 15px 'Segoe UI', Arial, sans-serif; fill: #06121e; }
    </style>
  </defs>
  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="190" fill="#5eead4" opacity="0.10"/>
  <circle cx="150" cy="630" r="180" fill="#79a7ff" opacity="0.10"/>
  <path d="M745 130 C832 76, 956 96, 1020 170 C1088 250, 1190 228, 1240 310" fill="none" stroke="#5eead4" stroke-width="3" opacity="0.20"/>

  <g transform="translate(70 64)">
    <text class="eyebrow" x="0" y="0">CASE STUDY 02</text>
    <text class="title" x="0" y="62">SOC Home Lab v2</text>
    <text class="subtitle" x="0" y="102">Security telemetry transformed into enriched alerts, SQL reporting, and operational metrics.</text>
  </g>

  <g transform="translate(70 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="118" rx="24" fill="#111d2d" stroke="#26364d"/>
    <text class="label" x="24" y="36">EVENTS</text>
    <text class="metric" x="24" y="82">332</text>
  </g>
  <g transform="translate(268 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="118" rx="24" fill="#111d2d" stroke="#26364d"/>
    <text class="label" x="24" y="36">ALERTS</text>
    <text class="metric" x="24" y="82">5</text>
  </g>
  <g transform="translate(466 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="118" rx="24" fill="#111d2d" stroke="#26364d"/>
    <text class="label" x="24" y="36">CRITICAL</text>
    <text class="metric" x="24" y="82">2</text>
  </g>
  <g transform="translate(664 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="118" rx="24" fill="#111d2d" stroke="#26364d"/>
    <text class="label" x="24" y="36">BACKLOG</text>
    <text class="metric" x="24" y="82">1</text>
  </g>
  <g transform="translate(862 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="175" height="118" rx="24" fill="#111d2d" stroke="#26364d"/>
    <text class="label" x="24" y="36">TRIAGE MIN</text>
    <text class="metric" x="24" y="82">26.8</text>
  </g>
  <g transform="translate(1060 205)" filter="url(#shadow)">
    <rect x="0" y="0" width="150" height="118" rx="24" fill="#111d2d" stroke="#26364d"/>
    <text class="label" x="24" y="36">SLA FLAGS</text>
    <text class="metric" x="24" y="82">3</text>
  </g>

  <g transform="translate(70 385)">
    <text class="section" x="0" y="0">Operational Analytics Flow</text>
    <g transform="translate(0 48)">
      <rect x="0" y="0" width="180" height="84" rx="22" fill="#79a7ff"/>
      <text class="chip" x="45" y="35">Simulated</text>
      <text class="chip" x="48" y="59">telemetry</text>
      <path d="M195 42 L234 42" stroke="#5eead4" stroke-width="4" stroke-linecap="round"/>
      <path d="M226 32 L240 42 L226 52" fill="none" stroke="#5eead4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="255" y="0" width="180" height="84" rx="22" fill="#ffffff"/>
      <text class="chip" x="302" y="35">Detection</text>
      <text class="chip" x="322" y="59">rules</text>
      <path d="M450 42 L489 42" stroke="#5eead4" stroke-width="4" stroke-linecap="round"/>
      <path d="M481 32 L495 42 L481 52" fill="none" stroke="#5eead4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="510" y="0" width="180" height="84" rx="22" fill="#ffffff"/>
      <text class="chip" x="565" y="35">Alert</text>
      <text class="chip" x="544" y="59">enrichment</text>
      <path d="M705 42 L744 42" stroke="#5eead4" stroke-width="4" stroke-linecap="round"/>
      <path d="M736 32 L750 42 L736 52" fill="none" stroke="#5eead4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="765" y="0" width="180" height="84" rx="22" fill="#ffffff"/>
      <text class="chip" x="820" y="35">SQL</text>
      <text class="chip" x="798" y="59">reporting</text>
      <path d="M960 42 L999 42" stroke="#5eead4" stroke-width="4" stroke-linecap="round"/>
      <path d="M991 32 L1005 42 L991 52" fill="none" stroke="#5eead4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="1020" y="0" width="190" height="84" rx="22" fill="url(#accent)"/>
      <text class="chip" x="1074" y="35">Dashboard</text>
      <text class="chip" x="1084" y="59">review</text>
    </g>
  </g>

  <g transform="translate(70 580)">
    <text class="section" x="0" y="0">What it demonstrates</text>
    <text class="body" x="0" y="44">SQL, Python, KPI reporting, detection logic, triage metrics, and data analysis applied to security operations.</text>
  </g>

  <g transform="translate(1010 54)">
    <rect x="0" y="0" width="200" height="42" rx="21" fill="#5eead4"/>
    <text class="chip" x="43" y="27">Security data</text>
    <rect x="0" y="54" width="200" height="42" rx="21" fill="#c9dcff"/>
    <text class="chip" x="34" y="81">SQL + Streamlit</text>
  </g>
</svg>
