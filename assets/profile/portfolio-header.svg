<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Miguel Angel Torres Mercado - Data Analytics Portfolio</title>
  <desc id="desc">Portfolio header highlighting SQL, Python, KPI reporting, dashboards, and security analytics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="55%" stop-color="#0f2537"/>
      <stop offset="100%" stop-color="#153b45"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#57e3d8" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#57e3d8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#57e3d8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <style>
      .title { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: #f5f7fb; letter-spacing: -1px; }
      .subtitle { font: 500 25px 'Segoe UI', Arial, sans-serif; fill: #b9c6d6; }
      .body { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #d7e1ea; }
      .small { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #9eb2c6; letter-spacing: 0.2px; }
      .chipText { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #08212a; }
      .metricLabel { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #a9bbca; }
      .metricValue { font: 800 30px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="34" fill="url(#glow)"/>
  <circle cx="1098" cy="72" r="130" fill="#57e3d8" opacity="0.10"/>
  <circle cx="1180" cy="310" r="150" fill="#f3b64b" opacity="0.09"/>
  <path d="M950 66 C1010 110, 1088 102, 1152 154 C1198 192, 1220 250, 1260 286" fill="none" stroke="#57e3d8" stroke-width="3" opacity="0.26"/>
  <path d="M910 330 C982 270, 1080 318, 1188 230" fill="none" stroke="#f3b64b" stroke-width="3" opacity="0.22"/>

  <g transform="translate(70 70)">
    <text class="small" x="0" y="0">DATA ANALYTICS PORTFOLIO</text>
    <text class="title" x="0" y="66">Miguel Angel Torres Mercado</text>
    <text class="subtitle" x="0" y="112">SQL, Python, KPI reporting, dashboards, and operational analytics</text>
    <text class="body" x="0" y="166">Building practical projects that move from business questions to reproducible analysis and clear decision support.</text>

    <g transform="translate(0 212)">
      <rect x="0" y="0" width="106" height="42" rx="21" fill="#57e3d8"/>
      <text class="chipText" x="31" y="27">SQL</text>
      <rect x="126" y="0" width="128" height="42" rx="21" fill="#d7efff"/>
      <text class="chipText" x="159" y="27">Python</text>
      <rect x="274" y="0" width="156" height="42" rx="21" fill="#f3b64b"/>
      <text class="chipText" x="304" y="27">Dashboards</text>
      <rect x="450" y="0" width="176" height="42" rx="21" fill="#9bd6ff"/>
      <text class="chipText" x="480" y="27">KPI Reporting</text>
      <rect x="646" y="0" width="200" height="42" rx="21" fill="#c9f7e7"/>
      <text class="chipText" x="674" y="27">Security Analytics</text>
    </g>
  </g>

  <g transform="translate(870 118)" filter="url(#softShadow)">
    <rect x="0" y="0" width="330" height="210" rx="28" fill="#102233" stroke="#2c5366"/>
    <text class="small" x="30" y="45">PORTFOLIO SIGNALS</text>
    <g transform="translate(30 72)">
      <text class="metricValue" x="0" y="34">2</text>
      <text class="metricLabel" x="54" y="30">case studies</text>
      <line x1="0" y1="56" x2="270" y2="56" stroke="#28495a"/>
      <text class="metricValue" x="0" y="104">SQL</text>
      <text class="metricLabel" x="88" y="100">analysis layer</text>
      <line x1="0" y1="126" x2="270" y2="126" stroke="#28495a"/>
      <text class="metricValue" x="0" y="174">BI</text>
      <text class="metricLabel" x="58" y="170">business communication</text>
    </g>
  </g>
</svg>
